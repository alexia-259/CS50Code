{% extends "layout.html" %}

{% block title %}
    Sell
{% endblock %}

{% block main %}
    <h2>Sell</h2>
    {% if sale_value %}
        <div class="alert alert-success text-center">
            Sale completed: {{ sale_value | usd }}
        </div>
    {% endif %}
    {% if cash %}
        <div class="alert alert-success text-center">
            Cash amount left: {{ cash | usd }}
        </div>
    {% endif %}
    <form action = "/sell" method = "post">
        <div class = "mb-3">
            <select name = "symbol">
                {% for symbol in symbols %}
                    <option value = "{{ symbol }}" > {{ symbol }} </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <input autocomplete = "off" autofocus class="form-control mx-auto w-auto" name = "shares" placeholder = "Shares" type = "number">
        </div>
        <button class="btn btn-dark" type = "submit"> Sell </button>
    </form>
{% endblock %}
