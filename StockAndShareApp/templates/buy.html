{% extends "layout.html" %}

{% block title %}
    Buy
{% endblock %}


{% block main %}
    <h2 class = "text-center"> Stocks Quote</h2>
    <form action = "/buy" method = "post" class = "text-center">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Stock symbol" required>
        </div>
        <div class="mb-3">
        <div class = "mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="shares" placeholder="Amount" type="number" min = "1">
        </div>
        <button class="btn btn-primary" type="submit">Buy now</button>
    </form>
{% endblock %}
